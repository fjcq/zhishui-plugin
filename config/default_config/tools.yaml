# 工具调用全局开关
EnableToolCalling: true

# 启用的工具列表（数组格式）
# 只有在此列表中的工具才会被启用
# 未列出的工具默认禁用
EnabledTools:
    # 好感度工具
    - change_user_favor
    - get_user_favor
    - get_user_info
    - get_group_info
    - get_user_profile
    - get_group_members
    # 好友工具
    - get_friend_list
    - get_friend_info
    # 互动工具
    - poke_user
    # 记忆工具
    - remember_user_info
    - recall_user_info
