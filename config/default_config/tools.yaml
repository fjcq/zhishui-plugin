# 工具调用全局开关
EnableToolCalling: true

# 工具管理模式
# blacklist: 黑名单模式 - 启用所有工具，排除 ToolList 中的工具（推荐）
# whitelist: 白名单模式 - 只启用 ToolList 中的工具
ToolManageMode: blacklist

# 工具列表
# 黑名单模式：填写要禁用的工具
# 白名单模式：填写要启用的工具
# 默认禁用敏感工具：禁言成员(mute_group_member)、移出成员(kick_group_member)
ToolList:
    - mute_group_member
    - kick_group_member
